name: Download Media

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Media URL'
        required: true
        type: string
      platform:
        description: 'Platform'
        required: true
        type: choice
        options:
          - youtube
          - telegram

permissions:
  contents: write
  actions: read

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download YouTube
        if: inputs.platform == 'youtube'
        run: |
          pip install yt-dlp
          python3 << 'PYEOF'
          import subprocess, sys, os

          url = "${{ inputs.url }}"

          # ساخت فایل cookies با فرمت Netscape
          cookies_content = """# Netscape HTTP Cookie File
          .youtube.com	TRUE	/	FALSE	2147483647	VISITOR_INFO1_LIVE	ZqV2xJq9y1E
          .youtube.com	TRUE	/	FALSE	2147483647	PREF	f6=40000000&tz=UTC
          .youtube.com	TRUE	/	FALSE	2147483647	CONSENT	YES+cb
          """

          with open("cookies.txt", "w") as f:
              f.write(cookies_content)

          print("Cookie file created")

          commands = [
              ["yt-dlp", "--no-playlist", "-f", "best[height<=720]/best", "-o", "media.%(ext)s", "--cookies", "cookies.txt", "--user-agent", "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36", url],
              ["yt-dlp", "--no-playlist", "-f", "worst", "-o", "media.%(ext)s", "--cookies", "cookies.txt", "--extractor-args", "youtube:player_client=android_vr", url],
              ["yt-dlp", "--no-playlist", "-f", "best", "-o", "media.%(ext)s", "--cookies", "cookies.txt", "--extractor-args", "youtube:player_client=tv", url],
          ]

          success = False
          for cmd in commands:
              print(f"Trying: {' '.join(cmd)}")
              result = subprocess.run(cmd, capture_output=True, text=True)
              if result.stdout:
                  print(result.stdout[-500:])
              if result.stderr:
                  print(result.stderr[-500:])
              if result.returncode == 0 and os.path.exists("media.mp4") or os.path.exists("media.webm") or os.path.exists("media.mkv"):
                  success = True
                  break
              print("  Failed, trying next method...")

          if not success:
              print("All methods failed")
              sys.exit(1)

          print("Download successful!")
          PYEOF

      - name: Download Telegram
        if: inputs.platform == 'telegram'
        run: |
          pip install requests
          python3 << 'PYEOF'
          import requests, re, os, sys

          url = "${{ inputs.url }}"
          headers = {"User-Agent": "Mozilla/5.0"}
          parts = url.replace("https://t.me/", "").split("/")
          channel = parts[0]
          msg_id = parts[1]
          embed_url = f"https://t.me/{channel}/{msg_id}?embed=1"
          
          r = requests.get(embed_url, headers=headers)
          video = re.search(r'<meta property="og:video" content="([^"]+)"', r.text)
          img = re.search(r'<meta property="og:image" content="([^"]+)"', r.text)
          media_url = video.group(1) if video else img.group(1) if img else None
          
          if not media_url:
              print("No media found")
              sys.exit(1)
          
          media_resp = requests.get(media_url, headers=headers)
          ext = "mp4" if video else "jpg"
          filename = f"media.{ext}"
          
          with open(filename, "wb") as f:
              f.write(media_resp.content)
          
          if ext != "mp4":
              os.rename(filename, "media.mp4")
          
          print(f"Downloaded: {os.path.getsize('media.mp4')} bytes")
          PYEOF

      - name: Check file
        run: |
          ls -la
          if [ -f media.mp4 ] || [ -f media.webm ] || [ -f media.mkv ]; then
            echo "File found"
          else
            echo "ERROR: No media file"
            exit 1
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: media.*
          tag_name: download-${{ github.run_id }}
          name: Download ${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
