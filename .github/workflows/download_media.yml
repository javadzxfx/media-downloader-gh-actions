name: Download Media

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Media URL'
        required: true
        type: string
      platform:
        description: 'Platform'
        required: true
        type: choice
        options:
          - youtube
          - telegram

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download YouTube
        if: inputs.platform == 'youtube'
        run: |
          pip install yt-dlp
          yt-dlp --no-playlist -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" -o "media.%(ext)s" "${{ inputs.url }}"

      - name: Download Telegram
        if: inputs.platform == 'telegram'
        run: |
          pip install requests
          python3 -c "
          import requests, re, os, sys
          url = '${{ inputs.url }}'
          headers = {'User-Agent': 'Mozilla/5.0'}
          parts = url.replace('https://t.me/','').split('/')
          channel = parts[0]
          msg_id = parts[1]
          embed_url = f'https://t.me/{channel}/{msg_id}?embed=1'
          r = requests.get(embed_url, headers=headers)
          video = re.search(r'<meta property=\"og:video\" content=\"([^\"]+)\"', r.text)
          img = re.search(r'<meta property=\"og:image\" content=\"([^\"]+)\"', r.text)
          media_url = video.group(1) if video else img.group(1) if img else None
          if not media_url:
              print('No media found')
              sys.exit(1)
          media_resp = requests.get(media_url, headers=headers)
          ext = 'mp4' if video else 'jpg'
          with open(f'media.{ext}', 'wb') as f:
              f.write(media_resp.content)
          if ext != 'mp4':
              os.rename(f'media.{ext}', 'media.mp4')
          "

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: media.mp4
          tag_name: release-${{ github.run_id }}
          name: Download ${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
