name: Download Media

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Media URL'
        required: true
        type: string
      platform:
        description: 'Platform (youtube/telegram)'
        required: true
        type: choice
        options:
          - youtube
          - telegram

permissions:
  contents: write
  actions: read

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ==================== YOUTUBE (از طریق Invidious) ====================
      - name: Download YouTube via Invidious
        if: inputs.platform == 'youtube'
        run: |
          pip install requests
          python3 << 'EOF'
          import requests, re, json, sys

          video_url = "${{ inputs.url }}"
          # استخراج video ID
          match = re.search(r'(?:v=|/)([0-9A-Za-z_-]{11})', video_url)
          if not match:
              print("Could not extract video ID")
              sys.exit(1)
          video_id = match.group(1)

          # استفاده از invidious به عنوان پروکسی (چندتا اینستنس عمومی معروف)
          invidious_instances = [
              "https://invidious.fdn.fr",
              "https://yewtu.be",
              "https://vid.puffyan.us",
              "https://invidious.snopyta.org"
          ]
          
          direct_url = None
          for instance in invidious_instances:
              try:
                  api_url = f"{instance}/api/v1/videos/{video_id}"
                  resp = requests.get(api_url, timeout=15, headers={"User-Agent": "Mozilla/5.0"})
                  if resp.status_code != 200:
                      continue
                  data = resp.json()
                  # پیدا کردن بهترین فرمت mp4
                  for fmt in data.get("formatStreams", []) + data.get("adaptiveFormats", []):
                      if fmt.get("container") == "mp4" and "url" in fmt:
                          direct_url = fmt["url"]
                          break
                  if direct_url:
                      print(f"Got stream URL from {instance}")
                      break
              except Exception as e:
                  print(f"Instance {instance} failed: {e}")
                  continue

          if not direct_url:
              print("All Invidious instances failed")
              sys.exit(1)

          # دانلود فایل
          print("Downloading video...")
          headers = {"User-Agent": "Mozilla/5.0"}
          with requests.get(direct_url, headers=headers, stream=True, timeout=300) as r:
              r.raise_for_status()
              with open("media.mp4", "wb") as f:
                  for chunk in r.iter_content(chunk_size=8192):
                      f.write(chunk)
          size_mb = __import__('os').path.getsize("media.mp4") / 1024 / 1024
          print(f"Downloaded: {size_mb:.1f} MB")
          EOF

      # ==================== TELEGRAM (بدون تغییر) ====================
      - name: Download Telegram
        if: inputs.platform == 'telegram'
        run: |
          pip install requests beautifulsoup4
          python3 -c "
          import requests, re, os, sys
          from bs4 import BeautifulSoup
          url = '${{ inputs.url }}'
          headers = {'User-Agent': 'Mozilla/5.0'}
          parts = url.replace('https://t.me/', '').split('/')
          channel = parts[0]
          msg_id = parts[1]
          embed_url = f'https://t.me/{channel}/{msg_id}?embed=1'
          r = requests.get(embed_url, headers=headers)
          soup = BeautifulSoup(r.text, 'html.parser')
          video = soup.find('video')
          img = soup.find('img', class_='tgme_page_photo_image')
          media_url = None
          if video:
              media_url = video.get('src')
          elif img:
              media_url = img.get('src')
          if not media_url:
              print('No media found')
              sys.exit(1)
          media_resp = requests.get(media_url, headers=headers)
          ext = 'mp4' if video else 'jpg'
          filename = f'media.{ext}'
          with open(filename, 'wb') as f:
              f.write(media_resp.content)
          if ext != 'mp4':
              os.rename(filename, 'media.mp4')
          print(f'Downloaded: {os.path.getsize(\"media.mp4\")} bytes')
          "

      # ==================== آپلود به ریلیز ====================
      - name: Upload to Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: media.*
          tag_name: download-${{ github.run_id }}
          name: Download ${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
