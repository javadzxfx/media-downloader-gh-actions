name: Download Media

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Media URL'
        required: true
        type: string
      platform:
        description: 'Platform'
        required: true
        type: choice
        options:
          - youtube
          - telegram

permissions:
  contents: write
  actions: read

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yt-dlp
        run: pip install yt-dlp requests

      - name: Download Media
        run: |
          if [ "${{ inputs.platform }}" = "youtube" ]; then
            echo "Downloading from YouTube: ${{ inputs.url }}"
            yt-dlp --no-playlist \
              -f "best[height<=720]/best" \
              -o "media.%(ext)s" \
              --extractor-args "youtube:player_client=mweb" \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              "${{ inputs.url }}" || \
            yt-dlp --no-playlist \
              -f "worst" \
              -o "media.%(ext)s" \
              --extractor-args "youtube:player_client=android" \
              "${{ inputs.url }}"
          else
            echo "Downloading from Telegram: ${{ inputs.url }}"
            python3 -c "
          import requests, re, sys
          url = '${{ inputs.url }}'
          headers = {'User-Agent': 'Mozilla/5.0'}
          parts = url.replace('https://t.me/','').split('/')
          channel = parts[0]
          msg_id = parts[1]
          embed_url = f'https://t.me/{channel}/{msg_id}?embed=1'
          r = requests.get(embed_url, headers=headers)
          video = re.search(r'<meta property=\"og:video\" content=\"([^\"]+)\"', r.text)
          img = re.search(r'<meta property=\"og:image\" content=\"([^\"]+)\"', r.text)
          media_url = video.group(1) if video else img.group(1) if img else None
          if not media_url:
              print('No media found')
              sys.exit(1)
          media_resp = requests.get(media_url, headers=headers)
          ext = 'mp4' if video else 'jpg'
          with open(f'media.{ext}', 'wb') as f:
              f.write(media_resp.content)
          if ext != 'mp4':
              import os
              os.rename(f'media.{ext}', 'media.mp4')
          "
          fi
          
          # چک کن فایل دانلود شده
          ls -la
          FILE=$(ls media.* 2>/dev/null | head -1)
          if [ -z "$FILE" ]; then
            echo "ERROR: No media file found"
            exit 1
          fi
          echo "Downloaded: $FILE ($(stat -c%s "$FILE") bytes)"

      - name: Create Release with file
        uses: softprops/action-gh-release@v2
        with:
          files: media.*
          tag_name: download-${{ github.run_id }}
          name: Download ${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
