name: Download Media

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Media URL'
        required: true
        type: string
      platform:
        description: 'Platform'
        required: true
        type: choice
        options:
          - youtube
          - telegram

permissions:
  contents: write
  actions: read

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download YouTube
        if: inputs.platform == 'youtube'
        run: |
          pip install requests
          python3 << 'PYEOF'
          import requests, re, sys, os, json

          url = "${{ inputs.url }}"
          
          match = re.search(r'(?:v=|/)([a-zA-Z0-9_-]{11})', url)
          if not match:
              print("Invalid YouTube URL")
              sys.exit(1)
          
          video_id = match.group(1)
          print(f"Video ID: {video_id}")
          
          piped_instances = [
              "https://pipedapi.kavin.rocks",
              "https://pipedapi.tokhmi.xyz",
              "https://pipedapi.moomoo.me",
              "https://pipedapi.syncpundit.io",
              "https://pipedapi.adminforge.de",
              "https://pipedapi.qdi.fi",
              "https://pipedapi.leptons.xyz",
              "https://piped-api.garudalinux.org",
              "https://pipedapi.r4fo.com",
          ]
          
          downloaded = False
          
          for instance in piped_instances:
              try:
                  api_url = f"{instance}/streams/{video_id}"
                  print(f"Trying: {api_url}")
                  
                  resp = requests.get(api_url, timeout=15, headers={"User-Agent": "Mozilla/5.0"})
                  
                  if resp.status_code != 200:
                      print(f"  Failed: HTTP {resp.status_code}")
                      continue
                  
                  data = resp.json()
                  
                  video_streams = data.get("videoStreams", [])
                  if not video_streams:
                      print("  No video streams found")
                      continue
                  
                  best = video_streams[-1]
                  for s in video_streams:
                      if s.get("quality", "").endswith("p"):
                          best = s
                  
                  stream_url = best.get("url", "")
                  if not stream_url:
                      print("  No URL in best stream")
                      continue
                  
                  print(f"  Quality: {best.get('quality', 'unknown')}")
                  print(f"  Downloading...")
                  
                  video_resp = requests.get(stream_url, headers={"User-Agent": "Mozilla/5.0"}, stream=True, timeout=120)
                  
                  if video_resp.status_code == 200:
                      with open("media.mp4", "wb") as f:
                          for chunk in video_resp.iter_content(chunk_size=8192):
                              if chunk:
                                  f.write(chunk)
                      
                      file_size = os.path.getsize("media.mp4")
                      print(f"  Downloaded: {file_size} bytes")
                      
                      if file_size > 10000:
                          downloaded = True
                          break
                      else:
                          os.remove("media.mp4")
                          print("  File too small, trying next...")
                  else:
                      print(f"  Stream download failed: HTTP {video_resp.status_code}")
                      
              except Exception as e:
                  print(f"  Error: {type(e).__name__}: {str(e)[:100]}")
                  continue
          
          if not downloaded:
              print("All Piped instances failed")
              sys.exit(1)
          
          print("Download successful!")
          PYEOF

      - name: Download Telegram
        if: inputs.platform == 'telegram'
        run: |
          pip install requests
          python3 << 'PYEOF'
          import requests, re, os, sys

          url = "${{ inputs.url }}"
          headers = {"User-Agent": "Mozilla/5.0"}
          parts = url.replace("https://t.me/", "").split("/")
          channel = parts[0]
          msg_id = parts[1]
          embed_url = f"https://t.me/{channel}/{msg_id}?embed=1"
          
          r = requests.get(embed_url, headers=headers)
          video = re.search(r'<meta property="og:video" content="([^"]+)"', r.text)
          img = re.search(r'<meta property="og:image" content="([^"]+)"', r.text)
          media_url = video.group(1) if video else img.group(1) if img else None
          
          if not media_url:
              print("No media found")
              sys.exit(1)
          
          media_resp = requests.get(media_url, headers=headers)
          ext = "mp4" if video else "jpg"
          filename = f"media.{ext}"
          
          with open(filename, "wb") as f:
              f.write(media_resp.content)
          
          if ext != "mp4":
              os.rename(filename, "media.mp4")
          
          print(f"Downloaded: {os.path.getsize('media.mp4')} bytes")
          PYEOF

      - name: Check file
        run: |
          ls -la
          if [ -f media.mp4 ] || [ -f media.webm ] || [ -f media.mkv ]; then
            echo "File found"
          else
            echo "ERROR: No media file"
            exit 1
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: media.*
          tag_name: download-${{ github.run_id }}
          name: Download ${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
