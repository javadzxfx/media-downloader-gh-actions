name: Download Media

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Media URL'
        required: true
        type: string
      platform:
        description: 'Platform'
        required: true
        type: choice
        options:
          - youtube
          - telegram

permissions:
  contents: write
  actions: read

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download YouTube via Invidious
        if: inputs.platform == 'youtube'
        run: |
          pip install requests
          python3 << 'EOF'
          import requests, re, sys, urllib.parse, json

          url = "${{ inputs.url }}"
          
          # استخراج video ID
          video_id = None
          patterns = [
              r'(?:youtube\.com/watch\?v=|youtu\.be/|youtube\.com/embed/|youtube\.com/v/)([a-zA-Z0-9_-]{11})',
              r'youtube\.com/shorts/([a-zA-Z0-9_-]{11})',
          ]
          for p in patterns:
              m = re.search(p, url)
              if m:
                  video_id = m.group(1)
                  break
          
          if not video_id:
              print("Could not extract video ID")
              sys.exit(1)
          
          print(f"Video ID: {video_id}")
          
          # لیست سرورهای Invidious (عمومی و رایگان)
          invidious_instances = [
              "https://invidious.fdn.fr",
              "https://vid.puffyan.us",
              "https://invidious.private.coffee",
              "https://yt.artemislena.eu",
              "https://invidious.perennialte.ch",
              "https://inv.nadeko.net",
              "https://invidious.nerdvpn.de",
              "https://iv.melmac.space",
              "https://invidious.privacyredirect.com",
              "https://invidious.einfachzocken.eu",
          ]
          
          downloaded = False
          headers = {"User-Agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36"}
          
          for instance in invidious_instances:
              try:
                  # گام ۱: دریافت اطلاعات ویدیو
                  api_url = f"{instance}/api/v1/videos/{video_id}"
                  print(f"Trying: {api_url}")
                  
                  resp = requests.get(api_url, headers=headers, timeout=15)
                  if resp.status_code != 200:
                      print(f"  Failed: HTTP {resp.status_code}")
                      continue
                  
                  data = resp.json()
                  
                  # گام ۲: پیدا کردن بهترین لینک دانلود
                  best_url = None
                  best_quality = 0
                  
                  # Format streams (DASH)
                  for fmt in data.get("formatStreams", []):
                      if "video" in fmt.get("type", "") and fmt.get("container") == "mp4":
                          h = int(fmt.get("quality", "0").replace("p", ""))
                          if h > best_quality:
                              best_quality = h
                              best_url = fmt["url"]
                  
                  # Adaptive formats
                  for fmt in data.get("adaptiveFormats", []):
                      container = fmt.get("container", "")
                      if container == "mp4" and fmt.get("encoding", "") == "h264":
                          h = int(fmt.get("qualityLabel", "0").replace("p", ""))
                          if h > best_quality:
                              best_quality = h
                              best_url = fmt["url"]
                  
                  if not best_url:
                      print(f"  No suitable format found")
                      continue
                  
                  print(f"  Found: {best_quality}p")
                  
                  # گام ۳: دانلود ویدیو
                  print(f"  Downloading...")
                  video_resp = requests.get(best_url, headers=headers, stream=True, timeout=120)
                  if video_resp.status_code == 200:
                      with open("media.mp4", "wb") as f:
                          for chunk in video_resp.iter_content(chunk_size=8192):
                              if chunk:
                                  f.write(chunk)
                      
                      file_size = __import__('os').path.getsize("media.mp4")
                      print(f"  Downloaded: {file_size} bytes")
                      
                      if file_size > 1000:  # حداقل ۱ کیلوبایت
                          downloaded = True
                          break
                      else:
                          print(f"  File too small, trying next instance...")
                  else:
                      print(f"  Download failed: HTTP {video_resp.status_code}")
                      
              except Exception as e:
                  print(f"  Error: {e}")
                  continue
          
          if not downloaded:
              print("All Invidious instances failed")
              sys.exit(1)
          
          print("Download successful!")
          EOF
          
          ls -la media.mp4

      - name: Download Telegram
        if: inputs.platform == 'telegram'
        run: |
          pip install requests
          python3 -c "
          import requests, re, os, sys
          url = '${{ inputs.url }}'
          headers = {'User-Agent': 'Mozilla/5.0'}
          parts = url.replace('https://t.me/','').split('/')
          channel = parts[0]
          msg_id = parts[1]
          embed_url = f'https://t.me/{channel}/{msg_id}?embed=1'
          r = requests.get(embed_url, headers=headers)
          video = re.search(r'<meta property=\"og:video\" content=\"([^\"]+)\"', r.text)
          img = re.search(r'<meta property=\"og:image\" content=\"([^\"]+)\"', r.text)
          media_url = video.group(1) if video else img.group(1) if img else None
          if not media_url:
              print('No media found')
              sys.exit(1)
          media_resp = requests.get(media_url, headers=headers)
          ext = 'mp4' if video else 'jpg'
          with open(f'media.{ext}', 'wb') as f:
              f.write(media_resp.content)
          if ext != 'mp4':
              os.rename(f'media.{ext}', 'media.mp4')
          "
          ls -la

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: media.mp4
          tag_name: download-${{ github.run_id }}
          name: Download ${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
