name: Download Media

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Media URL'
        required: true
        type: string
      platform:
        description: 'Platform'
        required: true
        type: choice
        options:
          - youtube
          - telegram

permissions:
  contents: write
  actions: read

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download YouTube
        if: inputs.platform == 'youtube'
        run: |
          pip install requests
          python3 -c "
          import requests, json, sys, os, re
          from urllib.parse import parse_qs, unquote
          
          url = '${{ inputs.url }}'
          match = re.search(r'(?:v=|/)([a-zA-Z0-9_-]{11})', url)
          if not match:
              print('Invalid URL')
              sys.exit(1)
          
          video_id = match.group(1)
          print(f'Video ID: {video_id}')
          
          api_url = 'https://www.youtube.com/youtubei/v1/player'
          
          clients = [
              {
                  'name': 'iOS',
                  'clientName': 'IOS',
                  'clientVersion': '19.45.4',
                  'userAgent': 'com.google.ios.youtube/19.45.4 (iPhone16,2; U; CPU iOS 18_1_0 like Mac OS X; en_US)',
                  'osName': 'iPhone',
                  'osVersion': '18.1.0.22B83',
              },
              {
                  'name': 'Android',
                  'clientName': 'ANDROID',
                  'clientVersion': '19.44.38',
                  'userAgent': 'com.google.android.youtube/19.44.38 (Linux; U; Android 14; en_US) gzip',
                  'osName': 'Android',
                  'osVersion': '14',
              },
              {
                  'name': 'TV',
                  'clientName': 'TVHTML5',
                  'clientVersion': '7.20241113.16.00',
                  'userAgent': 'Mozilla/5.0 (Chromecast; Linux; Tizen 6.5) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/114.0.0.0 Safari/537.36',
              },
          ]
          
          success = False
          
          for client in clients:
              print(f'Trying client: {client[\"name\"]}...')
              
              payload = {
                  'videoId': video_id,
                  'context': {
                      'client': {
                          'clientName': client['clientName'],
                          'clientVersion': client['clientVersion'],
                          'userAgent': client['userAgent'],
                          'osName': client.get('osName', ''),
                          'osVersion': client.get('osVersion', ''),
                      }
                  }
              }
              
              headers = {
                  'User-Agent': client['userAgent'],
                  'Content-Type': 'application/json',
                  'Accept': '*/*',
              }
              
              try:
                  resp = requests.post(api_url, headers=headers, json=payload, timeout=30)
                  data = resp.json()
                  
                  playability = data.get('playabilityStatus', {})
                  status = playability.get('status', 'UNKNOWN')
                  reason = playability.get('reason', '')
                  
                  print(f'  Status: {status} - {reason}')
                  
                  if status == 'OK':
                      streaming = data.get('streamingData', {})
                      formats = streaming.get('formats', []) + streaming.get('adaptiveFormats', [])
                      
                      if not formats:
                          print('  No formats')
                          continue
                      
                      best = None
                      best_h = 0
                      for fmt in formats:
                          h = fmt.get('height', 0)
                          mime = fmt.get('mimeType', '')
                          if h > best_h and 'mp4' in mime:
                              best_h = h
                              best = fmt
                      
                      if not best:
                          for fmt in formats:
                              if fmt.get('url'):
                                  best = fmt
                                  break
                      
                      if not best:
                          print('  No suitable format')
                          continue
                      
                      video_url = best.get('url', '')
                      if not video_url and 'signatureCipher' in best:
                          cipher = best['signatureCipher']
                          params = parse_qs(cipher)
                          video_url = unquote(params['url'][0])
                      
                      if not video_url:
                          print('  No URL')
                          continue
                      
                      print(f'  Downloading {best_h}p...')
                      dl_resp = requests.get(video_url, headers={'User-Agent': client['userAgent']}, stream=True, timeout=120)
                      
                      if dl_resp.status_code == 200:
                          with open('media.mp4', 'wb') as f:
                              for chunk in dl_resp.iter_content(chunk_size=8192):
                                  if chunk:
                                      f.write(chunk)
                          
                          size = os.path.getsize('media.mp4')
                          print(f'  Downloaded: {size} bytes')
                          if size > 10000:
                              success = True
                              break
                  else:
                      print(f'  Skipping client...')
                      
              except Exception as e:
                  print(f'  Error: {e}')
          
          if not success:
              print('All clients failed')
              sys.exit(1)
          
          print('Success!')
          "

      - name: Download Telegram
        if: inputs.platform == 'telegram'
        run: |
          pip install requests
          python3 -c "
          import requests, re, os, sys
          
          url = '${{ inputs.url }}'
          headers = {'User-Agent': 'Mozilla/5.0'}
          parts = url.replace('https://t.me/', '').split('/')
          channel = parts[0]
          msg_id = parts[1]
          embed_url = f'https://t.me/{channel}/{msg_id}?embed=1'
          
          r = requests.get(embed_url, headers=headers)
          video = re.search(r'<meta property=\"og:video\" content=\"([^\"]+)\"', r.text)
          img = re.search(r'<meta property=\"og:image\" content=\"([^\"]+)\"', r.text)
          media_url = video.group(1) if video else img.group(1) if img else None
          
          if not media_url:
              print('No media found')
              sys.exit(1)
          
          media_resp = requests.get(media_url, headers=headers)
          ext = 'mp4' if video else 'jpg'
          filename = f'media.{ext}'
          
          with open(filename, 'wb') as f:
              f.write(media_resp.content)
          
          if ext != 'mp4':
              os.rename(filename, 'media.mp4')
          
          print(f'Downloaded: {os.path.getsize(\"media.mp4\")} bytes')
          "

      - name: Check file
        run: |
          ls -la
          if [ -f media.mp4 ] || [ -f media.webm ]; then
            echo "SUCCESS"
          else
            echo "FAILED"
            exit 1
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: media.*
          tag_name: download-${{ github.run_id }}
          name: Download ${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
