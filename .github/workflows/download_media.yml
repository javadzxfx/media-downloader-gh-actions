name: Download Media

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Media URL'
        required: true
        type: string
      platform:
        description: 'Platform'
        required: true
        type: choice
        options:
          - youtube
          - telegram

permissions:
  contents: write
  actions: read

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download YouTube
        if: inputs.platform == 'youtube'
        run: |
          pip install yt-dlp
          
          # ساخت فایل cookies ساده
          echo "# Netscape HTTP Cookie File" > cookies.txt
          echo ".youtube.com	TRUE	/	FALSE	2147483647	GPS	1" >> cookies.txt
          echo ".youtube.com	TRUE	/	FALSE	2147483647	VISITOR_INFO1_LIVE	ZqV2xJq9y1E" >> cookies.txt
          echo ".youtube.com	TRUE	/	FALSE	2147483647	YSC	Bi9IV1VxX5o" >> cookies.txt
          
          # تلاش ۱: با extractor-args و po_token خالی
          yt-dlp \
            --no-playlist \
            -f "worst[ext=mp4]" \
            -o "media.%(ext)s" \
            --cookies cookies.txt \
            --extractor-args "youtube:player_client=android;po_token=web;visitor_data=CgtZcVYyeEpxOXkxRSiF9bSWBjIKCgJJUxIEGgAgGQ%3D%3D" \
            --user-agent "com.google.android.youtube/19.44.38 (Linux; U; Android 14; en_US) gzip" \
            "${{ inputs.url }}" || \
          yt-dlp \
            --no-playlist \
            -f "worst" \
            -o "media.%(ext)s" \
            --cookies cookies.txt \
            --extractor-args "youtube:player_client=ios" \
            --user-agent "com.google.ios.youtube/19.45.4 (iPhone16,2; U; CPU iOS 18_1_0 like Mac OS X; en_US)" \
            "${{ inputs.url }}" || \
          yt-dlp \
            --no-playlist \
            -f "worst" \
            -o "media.%(ext)s" \
            --cookies cookies.txt \
            --extractor-args "youtube:player_client=mweb" \
            "${{ inputs.url }}" || \
          yt-dlp \
            --no-playlist \
            -f "worst" \
            -o "media.%(ext)s" \
            --cookies cookies.txt \
            --extractor-args "youtube:player_client=web;po_token=web" \
            "${{ inputs.url }}" || \
          yt-dlp \
            --no-playlist \
            -o "media.%(ext)s" \
            --cookies cookies.txt \
            "${{ inputs.url }}"

      - name: Download Telegram
        if: inputs.platform == 'telegram'
        run: |
          pip install requests
          python3 -c "
          import requests, re, os, sys
          url = '${{ inputs.url }}'
          headers = {'User-Agent': 'Mozilla/5.0'}
          parts = url.replace('https://t.me/', '').split('/')
          channel = parts[0]
          msg_id = parts[1]
          embed_url = f'https://t.me/{channel}/{msg_id}?embed=1'
          r = requests.get(embed_url, headers=headers)
          video = re.search(r'<meta property=\"og:video\" content=\"([^\"]+)\"', r.text)
          img = re.search(r'<meta property=\"og:image\" content=\"([^\"]+)\"', r.text)
          media_url = video.group(1) if video else img.group(1) if img else None
          if not media_url:
              print('No media found')
              sys.exit(1)
          media_resp = requests.get(media_url, headers=headers)
          ext = 'mp4' if video else 'jpg'
          filename = f'media.{ext}'
          with open(filename, 'wb') as f:
              f.write(media_resp.content)
          if ext != 'mp4':
              os.rename(filename, 'media.mp4')
          print(f'Downloaded: {os.path.getsize(\"media.mp4\")} bytes')
          "

      - name: Check and upload
        run: |
          ls -la
          if [ -f media.* ]; then
            echo "FILE EXISTS"
          else
            echo "NO FILE"
            exit 1
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: media.*
          tag_name: download-${{ github.run_id }}
          name: Download ${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
