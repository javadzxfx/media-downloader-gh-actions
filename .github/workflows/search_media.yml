name: Search Media

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'Search query'
        required: true
        type: string
      platform:
        description: 'Platform'
        required: true
        type: choice
        options:
          - youtube
          - telegram

permissions:
  contents: write
  actions: read

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install yt-dlp
        if: inputs.platform == 'youtube'
        run: pip install yt-dlp requests

      - name: Search YouTube
        if: inputs.platform == 'youtube'
        run: |
          yt-dlp "ytsearch10:${{ inputs.query }}" --flat-playlist --dump-json > search_output.jsonl
          python3 -c "
          import json, requests, base64
          results = []
          with open('search_output.jsonl') as f:
              for line in f:
                  data = json.loads(line)
                  vid_id = data.get('id', '')
                  thumb_url = f'https://i.ytimg.com/vi/{vid_id}/hqdefault.jpg' if vid_id else ''
                  thumb_base64 = ''
                  if thumb_url:
                      try:
                          resp = requests.get(thumb_url, timeout=10)
                          if resp.status_code == 200:
                              thumb_base64 = base64.b64encode(resp.content).decode('utf-8')
                      except:
                          pass
                  results.append({
                      'title': data.get('title',''),
                      'url': data.get('webpage_url','') or data.get('url',''),
                      'channel': data.get('channel','') or data.get('uploader',''),
                      'thumbnail_base64': thumb_base64
                  })
          with open('results.json','w') as out:
              json.dump(results, out)
          "

      - name: Search Telegram
        if: inputs.platform == 'telegram'
        run: |
          pip install requests beautifulsoup4
          python3 -c "
          import requests, re, json, urllib.parse, base64
          from bs4 import BeautifulSoup
          query = '${{ inputs.query }}'
          search_url = f'https://t.me/s/?q={urllib.parse.quote(query)}'
          headers = {'User-Agent': 'Mozilla/5.0'}
          resp = requests.get(search_url, headers=headers, timeout=15)
          results = []
          if resp.status_code == 200:
              soup = BeautifulSoup(resp.text, 'html.parser')
              for msg in soup.select('.tgme_widget_message_wrap'):
                  link_elem = msg.select_one('.tgme_widget_message_link')
                  title = msg.select_one('.tgme_widget_message_text')
                  img_elem = msg.select_one('img')
                  thumb_base64 = ''
                  if img_elem and img_elem.get('src'):
                      try:
                          img_resp = requests.get(img_elem['src'], timeout=10)
                          if img_resp.status_code == 200:
                              thumb_base64 = base64.b64encode(img_resp.content).decode('utf-8')
                      except:
                          pass
                  if link_elem:
                      url = link_elem['href']
                      results.append({
                          'title': title.get_text(strip=True)[:100] if title else 'No title',
                          'url': url,
                          'channel': url.split('/')[3] if len(url.split('/'))>3 else '',
                          'thumbnail_base64': thumb_base64
                      })
          with open('results.json','w') as f:
              json.dump(results[:10], f)
          "
          if [ ! -s results.json ]; then echo '[]' > results.json; fi

      - name: Upload Results as Release
        uses: softprops/action-gh-release@v2
        with:
          files: results.json
          tag_name: search-${{ github.run_id }}
          name: Search Results - ${{ inputs.query }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
